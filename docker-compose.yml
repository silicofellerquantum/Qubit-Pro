version: "3.9"

# ── Service Orchestration ─────────────────────────────────────────────────────
services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: quantum_db
    environment:
      POSTGRES_DB: quantum_studio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    # Restrict db port access to localhost for security hardening
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantum_studio"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (Job Queue Broker) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quantum_queue_broker
    # Run with Append Only File (AOF) persistence for task durability
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Backend API Server ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantum_backend_api
    # Shared environment config anchor
    environment: &backend-env
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/quantum_studio
      SYNC_DATABASE_URL: postgresql://postgres:password@db:5432/quantum_studio
      REDIS_URL: redis://redis:6379/0
      QUEUE_BACKEND: redis
      SECRET_KEY: "${SECRET_KEY:-dev-secret-key-change-in-production-minimum-32-chars}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://localhost:3000"
      WORKSPACE_ROOT: "/app/workspaces"
      PALACE_MOCK_MODE: "${PALACE_MOCK_MODE:-false}"
    # Keep ports internal to Nginx for security; expose local port only for direct backend testing if needed
    expose:
      - "5000"
    volumes:
      # Shared volume for simulation file exchange between API and Worker
      - workspace_data:/app/workspaces
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Background Worker (Queue Job Executor) ──────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantum_simulation_worker
    # Reuse the backend image but run the queue worker daemon instead
    command: ["python", "-m", "app.simulation.queue.worker"]
    environment: *backend-env
    volumes:
      # Mount the same shared workspaces volume to read geometry/mesh files and write outputs
      - workspace_data:/app/workspaces
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (SSR Server) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantum_frontend_ssr
    environment:
      VITE_BACKEND_URL: http://localhost # Under reverse proxy, both share the same host
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx Reverse Proxy (Single Entry Point) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: quantum_nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── Prometheus (Metrics Scraper) ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: quantum_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  # ── Grafana (Telemetry Dashboard) ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.0.3
    container_name: quantum_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default password for demonstration; override in production env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3001:3000" # Expose Grafana on host port 3001 to avoid collisions
    depends_on:
      - prometheus
    restart: unless-stopped

# ── Storage Volumes ───────────────────────────────────────────────────────────
volumes:
  pg_data:
  redis_data:
  workspace_data:
  prometheus_data:
  grafana_data:
