name: Quantum Studio Production CI/CD Pipeline

on:
  push:
    branches: [ main, dev, simulation-spack ]
  pull_request:
    branches: [ main, dev, simulation-spack ]

jobs:
  # ── 1. Lint, Format, and Type Checks ────────────────────────────────────────
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Linters & Typecheckers
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy

      - name: Run Python Format Check (Black)
        run: black --check backend/

      - name: Run Python Linter (Ruff)
        run: ruff check backend/

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Linters & Typecheckers
        working-directory: ./frontend
        run: npm ci

      - name: Run Frontend Lint & Typecheck
        working-directory: ./frontend
        run: |
          npm run lint || echo "Lint warnings allowed"
          # Run TypeScript compilation check
          npx tsc --noEmit

  # ── 2. Run Automation Tests ──────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -e backend/physics_analysis/

      - name: Run Pytest Suite
        working-directory: ./backend
        run: |
          pytest tests/

  # ── 3. Security Code Analysis ────────────────────────────────────────────────
  security-scans:
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Security Scanners
        run: pip install bandit safety

      - name: Run Bandit Security Scan (SAST)
        run: bandit -r backend/app/ -ll -ii

      - name: Run Safety Check (Dependency Vuln Check)
        run: safety check -r backend/requirements.txt || echo "Safety warnings allowed in dev"

  # ── 4. Verify Docker Image Builds ────────────────────────────────────────────
  build-and-verify-containers:
    runs-on: ubuntu-latest
    needs: [test-backend, security-scans]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: silicofeller/quantum-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: silicofeller/quantum-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
