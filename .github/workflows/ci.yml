name: CI

on:
  push:
    branches: [main, develop, editor-project]
  pull_request:
    branches: [main, develop, editor-project]

jobs:
  backend:
    name: Backend (Python 3.9)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          # Prefer reproducible installs with npm ci.
          # Fall back to npm install if lockfile is still out of sync.
          if [ -f package-lock.json ]; then
            npm ci || (echo "npm ci failed — falling back to npm install" && npm install)
          else
            npm install
          fi

      - name: TypeScript type check
        run: npx tsc --noEmit
