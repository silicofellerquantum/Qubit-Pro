# ── Rate Limiting Zone ────────────────────────────────────────────────────────
# Allocate 10MB memory zone (approx. 160,000 IPs) limiting clients to 10 req/sec
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── Upstreams ─────────────────────────────────────────────────────────────────
upstream backend_server {
    server backend:5000;
    keepalive 32; # Keep-alive connections to backend to avoid TCP socket exhaustion
}

upstream frontend_server {
    server frontend:3000;
    keepalive 32;
}

# ── Reverse Proxy Server ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # Inject security headers into all responses
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:;" always;

    # Allow uploading large geometry designs and model layouts
    client_max_body_size 50M;

    # Global proxy headers
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API Routes ────────────────────────────────────────────────────────────
    location /api/ {
        # Enforce rate limiting with burst allowance
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend_server;
    }

    # ── WebSocket upgrades (Progress & Log Streaming) ─────────────────────────
    location /api/queue/ws {
        proxy_pass http://backend_server;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400; # Prevent timeouts during long-running tasks
    }

    # ── FastAPI OpenAPI Docs ──────────────────────────────────────────────────
    location /docs {
        proxy_pass http://backend_server;
    }
    location /redoc {
        proxy_pass http://backend_server;
    }
    location /openapi.json {
        proxy_pass http://backend_server;
    }

    # ── Cloud Probes / Health and Telemetry Probes ────────────────────────────
    location /live {
        proxy_pass http://backend_server;
    }
    location /ready {
        proxy_pass http://backend_server;
    }
    location /health {
        proxy_pass http://backend_server;
    }
    location /metrics {
        proxy_pass http://backend_server;
    }

    # ── Frontend (SSR and assets) ─────────────────────────────────────────────
    location / {
        proxy_pass http://frontend_server;
        
        # Enable websockets for frontend HMR or updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
